<!DOCTYPE html>

  <!-- 🔥 EMBED (QUANDO INCOLLI LINK SU DISCORD) -->

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #0a1a2f, #0f3057);
      color: white;
      text-align: center;
    }

    header {
      padding: 50px 20px;
    }

    h1 {
      font-size: 3em;
      margin: 0;
      color: #4fd1ff;
    }

    p {
      opacity: 0.8;
    }

    .btn {
      display: inline-block;
      margin: 15px;
      padding: 12px 25px;
      border-radius: 25px;
      text-decoration: none;
      color: white;
      background: #4fd1ff;
      transition: 0.3s;
    }

    .btn:hover {
      background: #1fb6ff;
    }

    section {
      padding: 40px 20px;
    }

    .card {
      background: rgba(255,255,255,0.05);
      padding: 20px;
      margin: 15px auto;
      border-radius: 15px;
      max-width: 300px;
    }

    footer {

    }

  <section>
